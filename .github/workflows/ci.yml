name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v

  import-check:
    name: Import check (all entrypoints)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Verify all module entrypoints import cleanly
        run: |
          python - << 'EOF'
          import importlib, sys

          entrypoints = [
              # core
              "mnemon.extract", "mnemon.checkin", "mnemon.passive_scan",
              "mnemon.reply_extract", "mnemon.synthesize", "mnemon.profile_sync",
              "mnemon.checkin_followup",
              # daily
              "mnemon.entity_extract", "mnemon.decisions", "mnemon.healthcheck",
              "mnemon.memory",
              # biofeedback
              "mnemon.biofeedback", "mnemon.biofeedback_gadgetbridge",
              "mnemon.biofeedback_gb_ingest", "mnemon.muse_aggregate",
              "mnemon.muse_recorder",
              # weekly
              "mnemon.liwc", "mnemon.stress_index",
              # optional
              "mnemon.budget_bridge", "mnemon.voicenote", "mnemon.domain_prober",
              "mnemon.backfill", "mnemon.motives",
              # monthly
              "mnemon.schemas", "mnemon.goals", "mnemon.sdt", "mnemon.portrait",
              "mnemon.idiolect", "mnemon.caps", "mnemon.attachment",
              "mnemon.defenses", "mnemon.narrative", "mnemon.appraisal",
              "mnemon.mental_models", "mnemon.dual_process", "mnemon.constructs",
              # demo
              "mnemon.demo_runner",
          ]

          failed = []
          for mod in entrypoints:
              try:
                  importlib.import_module(mod)
              except Exception as e:
                  failed.append(f"{mod}: {e}")

          if failed:
              print("FAILED:")
              for f in failed:
                  print(f"  {f}")
              sys.exit(1)

          print(f"All {len(entrypoints)} entrypoints import cleanly.")
          EOF

  sanitization:
    name: Sanitization checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Run sanitization tests
        run: |
          python -m pytest tests/test_docs_sanitization_markers.py \
                           tests/test_hook_sanitization_markers.py \
                           tests/test_python_sanitization_markers.py \
                           tests/test_python_depersonalization_markers.py \
                           -v
