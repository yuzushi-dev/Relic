name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v

  import-check:
    name: Import check (all entrypoints)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Verify all module entrypoints import cleanly
        run: |
          python - << 'EOF'
          import importlib, sys

          entrypoints = [
              # core
              "relic.extract", "relic.checkin", "relic.passive_scan",
              "relic.reply_extract", "relic.synthesize", "relic.profile_sync",
              "relic.checkin_followup",
              # daily
              "relic.entity_extract", "relic.decisions", "relic.healthcheck",
              "relic.memory",
              # biofeedback
              "relic.biofeedback", "relic.biofeedback_gadgetbridge",
              "relic.biofeedback_gb_ingest", "relic.muse_aggregate",
              "relic.muse_recorder",
              # weekly
              "relic.liwc", "relic.stress_index",
              # optional
              "relic.budget_bridge", "relic.voicenote", "relic.domain_prober",
              "relic.backfill", "relic.motives",
              # monthly
              "relic.schemas", "relic.goals", "relic.sdt", "relic.portrait",
              "relic.idiolect", "relic.caps", "relic.attachment",
              "relic.defenses", "relic.narrative", "relic.appraisal",
              "relic.mental_models", "relic.dual_process", "relic.constructs",
              # demo
              "relic.demo_runner",
          ]

          failed = []
          for mod in entrypoints:
              try:
                  importlib.import_module(mod)
              except Exception as e:
                  failed.append(f"{mod}: {e}")

          if failed:
              print("FAILED:")
              for f in failed:
                  print(f"  {f}")
              sys.exit(1)

          print(f"All {len(entrypoints)} entrypoints import cleanly.")
          EOF

  sanitization:
    name: Sanitization checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Run sanitization tests
        run: |
          python -m pytest tests/test_docs_sanitization_markers.py \
                           tests/test_hook_sanitization_markers.py \
                           tests/test_python_sanitization_markers.py \
                           tests/test_python_depersonalization_markers.py \
                           -v
